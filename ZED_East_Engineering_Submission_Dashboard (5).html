<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZED East — Engineering Submission Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --royal-900:#0e1a5c;
  --royal-800:#16247a;
  --royal-700:#1d2f96;
  --royal-600:#2540c9;
  --royal-500:#3854e0;
  --royal-400:#5b74e8;
  --royal-300:#8fa1f0;
  --royal-100:#e7ebfd;

  --c-approved:#0f9d63;
  --c-approved-bg:rgba(15,157,99,0.12);
  --c-review:#c8860a;
  --c-review-bg:rgba(200,134,10,0.13);
  --c-returned:#c0463a;
  --c-returned-bg:rgba(192,70,58,0.12);
  --c-rejected:#8a1f3a;
  --c-rejected-bg:rgba(138,31,58,0.12);
  --c-neutral:#6b7280;
  --c-neutral-bg:rgba(107,114,128,0.12);

  --bg:#eef1fb;
  --bg-grid-line: rgba(37,64,201,0.055);
  --panel:rgba(255,255,255,0.68);
  --panel-solid:#ffffff;
  --panel-border:rgba(255,255,255,0.55);
  --panel-shadow:0 8px 30px rgba(23,35,110,0.10), 0 1px 2px rgba(23,35,110,0.06);
  --text-1:#131a3a;
  --text-2:#4b5372;
  --text-3:#7d84a3;
  --divider:rgba(23,35,110,0.09);
  --hover:rgba(37,64,201,0.05);
  --input-bg:rgba(255,255,255,0.85);
  --input-border:rgba(23,35,110,0.14);
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:9px;
  --font-display:'Inter Tight', 'Segoe UI', Inter, sans-serif;
  --font-body:'Inter', 'Segoe UI', sans-serif;
}

html[data-theme="dark"]{
  --bg:#070b1e;
  --bg-grid-line: rgba(91,116,232,0.07);
  --panel:rgba(22,28,56,0.62);
  --panel-solid:#131a38;
  --panel-border:rgba(255,255,255,0.08);
  --panel-shadow:0 10px 34px rgba(0,0,0,0.45);
  --text-1:#eef1fc;
  --text-2:#a9b0d1;
  --text-3:#727ba3;
  --divider:rgba(255,255,255,0.08);
  --hover:rgba(91,116,232,0.10);
  --input-bg:rgba(255,255,255,0.05);
  --input-border:rgba(255,255,255,0.14);
  --royal-100:rgba(91,116,232,0.16);
  --c-approved-bg:rgba(15,157,99,0.18);
  --c-review-bg:rgba(200,134,10,0.20);
  --c-returned-bg:rgba(192,70,58,0.20);
  --c-rejected-bg:rgba(138,31,58,0.22);
  --c-neutral-bg:rgba(148,155,180,0.14);
}

*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:var(--font-body);
  background:
    linear-gradient(var(--bg-grid-line) 1px, transparent 1px) 0 0/38px 38px,
    linear-gradient(90deg, var(--bg-grid-line) 1px, transparent 1px) 0 0/38px 38px,
    var(--bg);
  color:var(--text-1);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background-color .35s ease, color .35s ease;
  padding-bottom:64px;
}

/* ============ LAYOUT SHELL ============ */
.shell{max-width:1360px; margin:0 auto; padding:0 28px;}

/* ============ HEADER ============ */
header.top{
  padding:30px 0 18px;
  display:flex; align-items:flex-start; justify-content:space-between; gap:24px;
  flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:16px;}
.brand-mark{
  width:52px; height:52px; border-radius:14px;
  background:linear-gradient(145deg, var(--royal-600), var(--royal-800));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 18px rgba(37,64,201,0.35);
  flex-shrink:0;
}
.brand-text h1{
  font-family:var(--font-display);
  font-size:22px; font-weight:800; letter-spacing:-0.01em; color:var(--text-1);
  line-height:1.15;
}
.brand-text .sub{
  font-size:13px; color:var(--text-3); margin-top:4px; font-weight:500;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.brand-text .sub .dot{width:4px;height:4px;border-radius:50%;background:var(--text-3); display:inline-block;}
.reg-code{
  font-family:'Inter Tight',monospace; font-size:11px; letter-spacing:.06em;
  color:var(--royal-600); background:var(--royal-100); padding:2px 8px; border-radius:6px; font-weight:700;
}
html[data-theme="dark"] .reg-code{color:var(--royal-300);}

.top-actions{display:flex; align-items:center; gap:10px;}
.theme-toggle{
  width:42px; height:42px; border-radius:12px; border:1px solid var(--panel-border);
  background:var(--panel); backdrop-filter:blur(16px); cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--text-2);
  transition:all .2s ease;
}
.theme-toggle:hover{color:var(--royal-600); border-color:var(--royal-300);}

/* ============ GLASS PANEL BASE ============ */
.glass{
  background:var(--panel);
  backdrop-filter:blur(18px) saturate(1.4);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:1px solid var(--panel-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--panel-shadow);
}

/* ============ FILTER BAR ============ */
.filter-bar{
  position:sticky; top:14px; z-index:40;
  padding:16px 20px 18px;
  margin-bottom:22px;
  animation:riseIn .5s ease both;
}
.filter-heading{
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:0 2px 12px; margin-bottom:2px; border-bottom:1px solid var(--divider);
  font-family:var(--font-body); color:var(--text-1);
}
.filter-heading-left{display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:800; color:var(--text-1);}
.filter-heading-left svg{color:var(--royal-600); flex-shrink:0;}
html[data-theme="dark"] .filter-heading-left svg{color:var(--royal-300);}
.active-badge{
  font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:20px; background:var(--royal-100); color:var(--royal-700);
}
html[data-theme="dark"] .active-badge{color:var(--royal-300);}

/* single horizontal filter row (desktop = one row, wraps on smaller viewports, order preserved) */
.filter-row{
  display:flex;
  flex-wrap:wrap;
  align-items:flex-end;
  gap:12px;
  margin-top:14px;
}
.filter-row .field{
  flex:1 1 160px;
  min-width:160px;
}
.field label{
  display:block; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
  color:var(--text-3); margin-bottom:6px;
}
.field-row{display:flex; gap:10px;}

/* Date Range: two compact date inputs presented as a single filter unit */
.field-daterange{ flex:1.3 1 210px; min-width:210px; }
.date-range-row{
  display:flex; align-items:center; gap:6px;
  border:1px solid var(--input-border); border-radius:var(--radius-sm); background:var(--input-bg);
  padding:0 8px;
}
.date-range-row input.date-input{
  border:none; background:transparent; padding:10px 4px; min-width:0; flex:1 1 0;
}
.date-range-row input.date-input:focus{ box-shadow:none; }
.date-range-row:focus-within{ border-color:var(--royal-500); box-shadow:0 0 0 3px var(--royal-100); }
.date-sep{ color:var(--text-3); font-weight:700; flex-shrink:0; }

/* Reset Filters sits at the end of the row */
.field-reset{ flex:0 0 auto; min-width:150px; }
.field-reset label{ visibility:hidden; }
.btn-reset{
  width:100%; justify-content:center; height:40px;
}

@media (min-width:1180px){
  .filter-row{ flex-wrap:nowrap; }
  .filter-row .field{ flex:1 1 0; min-width:0; }
  .field-daterange{ flex:1.3 1 0; }
  .field-reset{ flex:0 0 148px; }
}

/* select trigger */
.sel{position:relative;}
.sel-trigger{
  width:100%; text-align:left; display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--input-border);
  background:var(--input-bg); color:var(--text-1); font-size:13.5px; font-weight:600; cursor:pointer;
  transition:border-color .15s ease, box-shadow .15s ease;
  font-family:var(--font-body);
}
.sel-trigger:hover{border-color:var(--royal-400);}
.sel-trigger.active{border-color:var(--royal-500); box-shadow:0 0 0 3px var(--royal-100);}
.sel-trigger .chev{color:var(--text-3); flex-shrink:0; transition:transform .18s ease;}
.sel-trigger.open .chev{transform:rotate(180deg);}
.sel-trigger .val{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.sel-trigger .placeholder{color:var(--text-3); font-weight:500;}

.sel-panel{
  position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:60;
  background:var(--panel-solid); border:1px solid var(--panel-border); border-radius:var(--radius-md);
  box-shadow:0 16px 40px rgba(20,30,80,0.22);
  overflow:hidden; display:none; max-height:300px; flex-direction:column;
}
.sel-panel.show{display:flex; animation:popIn .14s ease both;}
.sel-search{
  padding:9px 11px; border:none; border-bottom:1px solid var(--divider); font-size:13px;
  background:transparent; color:var(--text-1); font-family:var(--font-body); outline:none; flex-shrink:0;
}
.sel-options{overflow-y:auto; padding:6px; flex:1;}
.sel-opt{
  padding:8px 10px; border-radius:8px; font-size:13.5px; cursor:pointer; color:var(--text-1);
  display:flex; align-items:center; gap:10px; font-weight:500;
}
.sel-opt:hover{background:var(--hover);}
.sel-opt.selected{background:var(--royal-100); color:var(--royal-700); font-weight:700;}
html[data-theme="dark"] .sel-opt.selected{color:var(--royal-300);}
.sel-opt .opt-label{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.sel-opt .chk{
  width:17px; height:17px; border-radius:5px; border:1.6px solid var(--input-border); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:#fff; transition:all .12s ease;
}
.sel-opt .chk.on{background:var(--royal-600); border-color:var(--royal-600);}
.sel-empty{padding:14px; text-align:center; font-size:12.5px; color:var(--text-3);}
.sel-footer{
  display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-top:1px solid var(--divider); flex-shrink:0;
}
.sel-clear, .sel-done{
  border:none; background:transparent; font-size:12px; font-weight:700; cursor:pointer; padding:6px 10px; border-radius:8px;
  font-family:var(--font-body);
}
.sel-clear{color:var(--text-3);}
.sel-clear:hover{color:var(--c-returned); background:var(--hover);}
.sel-done{color:var(--royal-600); background:var(--royal-100);}
html[data-theme="dark"] .sel-done{color:var(--royal-300);}
.sel-done:hover{filter:brightness(1.1);}

input.text-input, input.date-input{
  width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--input-border);
  background:var(--input-bg); color:var(--text-1); font-size:13.5px; font-family:var(--font-body); font-weight:500;
  outline:none; transition:border-color .15s ease, box-shadow .15s ease;
}
input.text-input:focus, input.date-input:focus{border-color:var(--royal-500); box-shadow:0 0 0 3px var(--royal-100);}
input.date-input{color-scheme:light; }
html[data-theme="dark"] input.date-input{color-scheme:dark;}

.filter-footer{
  display:flex; align-items:center; justify-content:space-between; margin-top:16px; padding-top:14px;
  border-top:1px solid var(--divider); flex-wrap:wrap; gap:10px;
}
.result-count{font-size:12.5px; color:var(--text-3); font-weight:600;}
.result-count b{color:var(--royal-600); font-weight:800;}
html[data-theme="dark"] .result-count b{color:var(--royal-300);}

.btn-row{display:flex; gap:8px; flex-wrap:wrap;}
.btn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:10px;
  font-size:12.5px; font-weight:700; cursor:pointer; border:1px solid transparent; font-family:var(--font-body);
  transition:all .15s ease; white-space:nowrap;
}
.btn-ghost{background:var(--input-bg); border-color:var(--input-border); color:var(--text-2);}
.btn-ghost:hover{border-color:var(--royal-400); color:var(--royal-600);}
.btn-primary{background:linear-gradient(135deg, var(--royal-500), var(--royal-700)); color:#fff; box-shadow:0 4px 14px rgba(37,64,201,0.35);}
.btn-primary:hover{filter:brightness(1.08); transform:translateY(-1px);}
.btn svg{flex-shrink:0;}

/* ============ SUMMARY TABLE ============ */
.section-head{display:flex; align-items:baseline; justify-content:space-between; margin:26px 0 12px; flex-wrap:wrap; gap:8px;}
.section-head h2{font-family:var(--font-display); font-size:16px; font-weight:800; color:var(--text-1); letter-spacing:-.01em;}
.section-head .context{font-size:12.5px; color:var(--text-3); font-weight:600;}

.summary-card{padding:6px; overflow:hidden;}
table.summary-table{width:100%; border-collapse:collapse;}
table.summary-table thead th{
  font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:800; color:var(--text-3);
  padding:14px 16px 8px; text-align:left; white-space:nowrap;
}
table.summary-table tbody td{
  padding:6px 16px 18px; font-family:var(--font-display); font-weight:800; font-size:26px; color:var(--text-1);
  letter-spacing:-.02em;
}
table.summary-table tbody td .unit{font-size:12px; font-weight:600; color:var(--text-3); margin-left:2px;}
table.summary-table tbody td.approved-v{color:var(--c-approved);}
table.summary-table tbody td.review-v{color:var(--c-review);}
table.summary-table tbody td.rejected-v{color:var(--c-rejected);}
table.summary-table tbody td.returned-v{color:var(--c-returned);}
table.summary-table tbody td.completion-v{color:var(--royal-600);}
html[data-theme="dark"] table.summary-table tbody td.completion-v{color:var(--royal-300);}

/* ============ BREAKDOWN LIST ============ */
.breakdown-list{display:flex; flex-direction:column; gap:10px;}
.area-card{overflow:hidden; animation:riseIn .4s ease both;}
.area-head{
  display:flex; align-items:center; gap:14px; padding:15px 18px; cursor:pointer; user-select:none;
}
.area-head:hover{background:var(--hover);}
.area-chevron{
  width:26px; height:26px; border-radius:8px; background:var(--royal-100); display:flex; align-items:center;
  justify-content:center; flex-shrink:0; transition:transform .2s ease; color:var(--royal-600);
}
html[data-theme="dark"] .area-chevron{color:var(--royal-300);}
.area-card.open .area-chevron{transform:rotate(90deg);}
.area-id{
  font-family:'Inter Tight',monospace; font-size:10.5px; font-weight:800; letter-spacing:.04em; color:var(--royal-600);
  background:var(--royal-100); padding:4px 9px; border-radius:7px; flex-shrink:0;
}
html[data-theme="dark"] .area-id{color:var(--royal-300);}
.area-name{font-weight:800; font-size:14.5px; color:var(--text-1); flex-shrink:0;}
.area-tags{display:flex; gap:6px; flex-wrap:wrap; flex:1;}
.tag{
  font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px; background:var(--input-bg);
  border:1px solid var(--input-border); color:var(--text-2);
}
.area-mini-stats{display:flex; gap:16px; flex-shrink:0; align-items:center;}
.mini-stat{text-align:right;}
.mini-stat .n{font-family:var(--font-display); font-weight:800; font-size:14px; color:var(--text-1);}
.mini-stat .l{font-size:9.5px; color:var(--text-3); font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
.completion-pill{
  font-size:12px; font-weight:800; padding:6px 12px; border-radius:20px; flex-shrink:0; min-width:56px; text-align:center;
}
.pc-high{background:var(--c-approved-bg); color:var(--c-approved);}
.pc-mid{background:var(--c-review-bg); color:var(--c-review);}
.pc-low{background:var(--c-returned-bg); color:var(--c-returned);}

.area-body{max-height:0; overflow:hidden; transition:max-height .35s ease;}
.area-card.open .area-body{max-height:6000px;}
.area-body-inner{padding:0 18px 18px;}

.subd-block{margin-top:12px;}
.subd-title{
  font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--royal-600);
  margin:0 0 8px 2px; display:flex; align-items:center; gap:6px;
}
html[data-theme="dark"] .subd-title{color:var(--royal-300);}
.subd-title::before{content:''; width:6px; height:6px; border-radius:2px; background:var(--royal-500); display:inline-block;}

table.trade-table{width:100%; border-collapse:collapse; border-radius:var(--radius-md); overflow:hidden;}
table.trade-table thead th{
  font-size:10px; text-transform:uppercase; letter-spacing:.045em; font-weight:800; color:var(--text-3);
  background:var(--hover); padding:9px 12px; text-align:left; white-space:nowrap;
}
table.trade-table thead th:first-child{border-radius:8px 0 0 8px;}
table.trade-table thead th:last-child{border-radius:0 8px 8px 0;}
table.trade-table tbody tr{cursor:pointer; transition:background .12s ease;}
table.trade-table tbody tr:hover{background:var(--hover);}
table.trade-table tbody td{padding:10px 12px; font-size:12.5px; font-weight:600; color:var(--text-2); border-bottom:1px solid var(--divider);}
table.trade-table tbody tr:last-child td{border-bottom:none;}
table.trade-table tbody td.trade-name{color:var(--text-1); font-weight:700;}
.status-badge{
  font-size:10.5px; font-weight:800; padding:4px 9px; border-radius:20px; display:inline-block; white-space:nowrap;
}
.sb-approved{background:var(--c-approved-bg); color:var(--c-approved);}
.sb-review{background:var(--c-review-bg); color:var(--c-review);}
.sb-returned{background:var(--c-returned-bg); color:var(--c-returned);}
.sb-notsub{background:var(--c-neutral-bg); color:var(--c-neutral);}
.sb-rejected{background:var(--c-rejected-bg); color:var(--c-rejected);}

.trade-detail-row td{background:var(--hover); padding:0 !important; border-bottom:1px solid var(--divider);}
.trade-detail-inner{padding:12px 16px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; animation:fadeIn .2s ease;}
.td-item .l{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); font-weight:800; margin-bottom:3px;}
.td-item .v{font-size:12.5px; font-weight:700; color:var(--text-1);}

/* ============ EMPTY STATE ============ */
.empty-state{padding:60px 24px; text-align:center;}
.empty-state svg{color:var(--text-3); margin-bottom:14px;}
.empty-state h3{font-family:var(--font-display); font-size:16px; font-weight:800; color:var(--text-1); margin-bottom:6px;}
.empty-state p{font-size:13px; color:var(--text-3); max-width:360px; margin:0 auto;}

/* ============ ANIMATIONS ============ */
@keyframes riseIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
@keyframes popIn{from{opacity:0; transform:translateY(-4px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);}}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}

/* ============ RESPONSIVE ============ */
@media (max-width:1024px){
  .filter-row .field{ flex:1 1 calc(50% - 12px); min-width:calc(50% - 12px); }
  .field-daterange{ flex:1 1 100%; min-width:100%; }
  .field-reset{ flex:1 1 100%; min-width:100%; }
  .btn-reset{ height:42px; }
  table.summary-table{overflow-x:auto; display:block;}
  .trade-detail-inner{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:640px){
  .shell{padding:0 14px;}
  header.top{padding:20px 0 14px;}
  .filter-row .field{ flex:1 1 100%; min-width:100%; }
  .filter-bar{position:static;}
  .area-head{flex-wrap:wrap;}
  .area-mini-stats{display:none;}
  table.summary-table{display:block; overflow-x:auto; white-space:nowrap;}
  .trade-detail-inner{grid-template-columns:1fr 1fr;}
  .btn-row{width:100%;}
  .btn{flex:1; justify-content:center;}
}

/* print */
@media print{
  .filter-bar, .theme-toggle, .btn-row, .top-actions{display:none !important;}
  body{background:#fff !important;}
  .glass{box-shadow:none !important; border:1px solid #ddd !important; backdrop-filter:none !important; background:#fff !important;}
  .area-body{max-height:none !important;}
  .area-card{break-inside:avoid;}
}

/* scrollbar */
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--input-border); border-radius:8px;}
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 21L21 3M21 3H13M21 3V11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="17" r="2.3" stroke="white" stroke-width="1.6"/></svg>
      </div>

<script>
(function(){
'use strict';

/* ============ STATUS META ============ */
const STATUS_META = {
  'Approved':      { label:'Approved',               badge:'sb-approved' },
  'Under Review':  { label:'Under Review',            badge:'sb-review'   },
  'Not Submitted': { label:'Not Submitted',           badge:'sb-notsub'   },
  'Resubmit':      { label:'Returned for Revision',   badge:'sb-returned' }
};
const STATUS_FILTER_OPTIONS = ['Approved','Under Review','Returned for Revision','Rejected','Not Submitted'];

function statusLabel(raw){ return (STATUS_META[raw] && STATUS_META[raw].label) || raw; }
function statusBadgeClass(raw){ return (STATUS_META[raw] && STATUS_META[raw].badge) || 'sb-notsub'; }

/* ============ STATE (multi-select arrays) ============ */
const state = {
  discipline:[], subDiscipline:[], trade:[], area:[], status:[],
  dateFrom:'', dateTo:'', search:''
};
const openAreas = new Set();
const openTrades = new Set();

/* ============ DERIVED OPTION LISTS ============ */
function uniqueInOrder(arr){ const seen=new Set(); const out=[]; for(const v of arr){ if(!seen.has(v)){seen.add(v); out.push(v);} } return out; }

function getDisciplines(){ return uniqueInOrder(RECORDS.map(r=>r.discipline)); }
function getSubDisciplines(disciplines){
  return uniqueInOrder(RECORDS.filter(r=> !disciplines.length || disciplines.includes(r.discipline)).map(r=>r.subDiscipline));
}
function getTrades(disciplines, subs){
  return uniqueInOrder(RECORDS.filter(r=>
    (!disciplines.length || disciplines.includes(r.discipline)) &&
    (!subs.length || subs.includes(r.subDiscipline))
  ).map(r=>r.trade));
}
function getAreas(disciplines, subs, trades){
  return uniqueInOrder(RECORDS.filter(r=>
    (!disciplines.length || disciplines.includes(r.discipline)) &&
    (!subs.length || subs.includes(r.subDiscipline)) &&
    (!trades.length || trades.includes(r.trade))
  ).map(r=>r.area));
}

/* ============ FILTER MATCHING ============ */
function matchesFilters(r){
  if(state.discipline.length && !state.discipline.includes(r.discipline)) return false;
  if(state.subDiscipline.length && !state.subDiscipline.includes(r.subDiscipline)) return false;
  if(state.trade.length && !state.trade.includes(r.trade)) return false;
  if(state.area.length && !state.area.includes(r.area)) return false;
  if(state.status.length && !state.status.includes(statusLabel(r.status))) return false;
  if(state.dateFrom && r.date < state.dateFrom) return false;
  if(state.dateTo && r.date > state.dateTo) return false;
  if(state.search){
    const q = state.search.toLowerCase();
    const hay = (r.discipline+' '+r.subDiscipline+' '+r.trade+' '+r.area).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

function getFiltered(){ return RECORDS.filter(matchesFilters); }

/* ============ AGGREGATION ============ */
function computeAgg(arr){
  const required = arr.length;
  const approved = arr.filter(r=>r.status==='Approved').length;
  const underReview = arr.filter(r=>r.status==='Under Review').length;
  const returned = arr.filter(r=>r.status==='Resubmit').length;
  const rejected = 0;
  const remaining = arr.filter(r=>r.status==='Not Submitted').length;
  const submitted = required - remaining;
  const completion = required ? Math.round((submitted/required)*100) : 0;
  return { required, submitted, remaining, approved, underReview, rejected, returned, completion };
}

/* ============ CASCADE PRUNING ============ */
function pruneCascade(){
  const validSubs = getSubDisciplines(state.discipline);
  state.subDiscipline = state.subDiscipline.filter(s=>validSubs.includes(s));
  const validTrades = getTrades(state.discipline, state.subDiscipline);
  state.trade = state.trade.filter(t=>validTrades.includes(t));
  const validAreas = getAreas(state.discipline, state.subDiscipline, state.trade);
  state.area = state.area.filter(a=>validAreas.includes(a));
}

/* ============ MULTI-SELECT COMPONENT ============ */
function createMultiSelect(containerId, opts){
  const { label, key, getOptions, placeholder, onChange } = opts;
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <label>${label}</label>
    <div class="sel">
      <button type="button" class="sel-trigger" id="${key}-trigger">
        <span class="val placeholder">${placeholder}</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="sel-panel" id="${key}-panel">
        <input type="text" class="sel-search" id="${key}-search" placeholder="Search…">
        <div class="sel-options" id="${key}-options"></div>
        <div class="sel-footer">
          <button type="button" class="sel-clear" id="${key}-clear">Clear</button>
          <button type="button" class="sel-done" id="${key}-done">Done</button>
        </div>
      </div>
    </div>`;

  const trigger = document.getElementById(`${key}-trigger`);
  const panel = document.getElementById(`${key}-panel`);
  const searchInput = document.getElementById(`${key}-search`);
  const optionsEl = document.getElementById(`${key}-options`);
  const clearBtn = document.getElementById(`${key}-clear`);
  const doneBtn = document.getElementById(`${key}-done`);

  function renderOptions(filterText){
    const options = getOptions();
    const ft = (filterText||'').toLowerCase();
    const filtered = options.filter(o => o.toLowerCase().includes(ft));
    let html = '';
    if(!filtered.length){
      html = `<div class="sel-empty">No matches</div>`;
    } else {
      filtered.forEach(o=>{
        const checked = state[key].includes(o);
        html += `<div class="sel-opt ${checked?'selected':''}" data-value="${o.replace(/"/g,'&quot;')}">
          <span class="chk ${checked?'on':''}">${checked?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':''}</span>
          <span class="opt-label">${o}</span>
        </div>`;
      });
    }
    optionsEl.innerHTML = html;
    optionsEl.querySelectorAll('.sel-opt[data-value]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const v = el.getAttribute('data-value');
        const arr = state[key];
        const idx = arr.indexOf(v);
        if(idx>=0) arr.splice(idx,1); else arr.push(v);
        if(onChange) onChange();
        updateTriggerLabel();
        renderOptions(searchInput.value);
        refreshDependentSelects(key);
        renderMain();
      });
    });
  }

  function updateTriggerLabel(){
    const valEl = trigger.querySelector('.val');
    const n = state[key].length;
    if(n===0){
      valEl.textContent = placeholder;
      valEl.classList.add('placeholder');
    } else if(n===1){
      valEl.textContent = state[key][0];
      valEl.classList.remove('placeholder');
    } else {
      valEl.textContent = `${n} selected`;
      valEl.classList.remove('placeholder');
    }
  }

  trigger.addEventListener('click', (e)=>{
    e.stopPropagation();
    const isOpen = panel.classList.contains('show');
    closeAllSelects();
    if(!isOpen){
      renderOptions('');
      panel.classList.add('show');
      trigger.classList.add('open','active');
      searchInput.value='';
      setTimeout(()=>searchInput.focus(), 30);
    }
  });
  searchInput.addEventListener('input', ()=> renderOptions(searchInput.value));
  searchInput.addEventListener('click', e=>e.stopPropagation());
  panel.addEventListener('click', e=>e.stopPropagation());
  clearBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    state[key] = [];
    if(onChange) onChange();
    updateTriggerLabel();
    renderOptions(searchInput.value);
    refreshDependentSelects(key);
    renderMain();
  });
  doneBtn.addEventListener('click', (e)=>{ e.stopPropagation(); closeAllSelects(); });

  container._update = updateTriggerLabel;
  container._renderOptions = renderOptions;
  updateTriggerLabel();
  renderOptions('');
}

function closeAllSelects(){
  document.querySelectorAll('.sel-panel.show').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.sel-trigger.open').forEach(t=>{t.classList.remove('open'); t.classList.remove('active');});
}
document.addEventListener('click', closeAllSelects);

const CASCADE_MAP = {
  discipline: ['f-subdiscipline','f-trade','f-area'],
  subDiscipline: ['f-trade','f-area'],
  trade: ['f-area']
};
function refreshDependentSelects(changedKey){
  if(changedKey==='discipline' || changedKey==='subDiscipline' || changedKey==='trade'){
    pruneCascade();
  }
  const deps = CASCADE_MAP[changedKey] || [];
  deps.forEach(id=>{
    const el = document.getElementById(id);
    if(el && el._update){ el._update(); el._renderOptions(''); }
  });
}

/* ============ SELECT INSTANTIATION ============ */
function initSelects(){
  createMultiSelect('f-discipline', { label:'Discipline', key:'discipline', placeholder:'All Disciplines', getOptions:()=>getDisciplines() });
  createMultiSelect('f-subdiscipline', { label:'Sub-Discipline', key:'subDiscipline', placeholder:'All Sub-Disciplines', getOptions:()=>getSubDisciplines(state.discipline) });
  createMultiSelect('f-trade', { label:'Trade', key:'trade', placeholder:'All Trades', getOptions:()=>getTrades(state.discipline, state.subDiscipline) });
  createMultiSelect('f-area', { label:'Area / Part', key:'area', placeholder:'All Areas / Parts', getOptions:()=>getAreas(state.discipline, state.subDiscipline, state.trade) });
  createMultiSelect('f-status', { label:'Submission Status', key:'status', placeholder:'All Statuses', getOptions:()=>STATUS_FILTER_OPTIONS });
}

function refreshAllSelectDisplays(){
  ['f-discipline','f-subdiscipline','f-trade','f-area','f-status'].forEach(id=>{
    const el = document.getElementById(id);
    if(el && el._update){ el._update(); el._renderOptions(''); }
  });
}

/* ============ RENDER: SUMMARY ============ */
function renderSummary(filtered){
  const agg = computeAgg(filtered);
  const row = document.getElementById('summaryRow');
  row.innerHTML = `
    <td>${agg.required}</td>
    <td>${agg.submitted}</td>
    <td>${agg.remaining}</td>
    <td class="approved-v">${agg.approved}</td>
    <td class="review-v">${agg.underReview}</td>
    <td class="rejected-v">${agg.rejected}</td>
    <td class="returned-v">${agg.returned}</td>
    <td class="completion-v">${agg.completion}<span class="unit">%</span></td>
  `;
  const parts = [];
  if(state.discipline.length) parts.push(state.discipline.join(' + '));
  if(state.subDiscipline.length) parts.push(state.subDiscipline.join(' + '));
  if(state.trade.length) parts.push(state.trade.join(' + '));
  if(state.area.length) parts.push(state.area.join(' + '));
  if(state.status.length) parts.push(state.status.join(' + '));
  document.getElementById('summaryContext').textContent = parts.length ? parts.join(' → ') : 'All disciplines';
}

/* ============ RENDER: BREAKDOWN ============ */
function pcClass(pct){ return pct>=80 ? 'pc-high' : pct>=40 ? 'pc-mid' : 'pc-low'; }

function areaCode(area){
  return area.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,10);
}

function renderTradeTable(records){
  const rows = records.map(r=>{
    const agg = computeAgg([r]);
    const key = r.id;
    const isOpen = openTrades.has(key);
    return `
    <tr class="trade-row" data-record="${r.id}">
      <td class="trade-name">${r.trade}</td>
      <td>${agg.required}</td>
      <td>${agg.submitted}</td>
      <td>${agg.remaining}</td>
      <td>${agg.approved}</td>
      <td>${agg.underReview}</td>
      <td>${agg.rejected}</td>
      <td>${agg.returned}</td>
      <td><span class="status-badge ${statusBadgeClass(r.status)}">${agg.completion}%</span></td>
    </tr>
    ${isOpen ? `
    <tr class="trade-detail-row"><td colspan="9">
      <div class="trade-detail-inner">
        <div class="td-item"><div class="l">Current Status</div><div class="v"><span class="status-badge ${statusBadgeClass(r.status)}">${statusLabel(r.status)}</span></div></div>
        <div class="td-item"><div class="l">Document Count</div><div class="v">1 drawing package</div></div>
        <div class="td-item"><div class="l">Last Updated</div><div class="v">${formatDate(r.date)}</div></div>
        <div class="td-item"><div class="l">Reference ID</div><div class="v">${r.id}</div></div>
      </div>
    </td></tr>` : ''}`;
  }).join('');

  return `
  <table class="trade-table">
    <thead><tr>
      <th>Trade</th><th>Required</th><th>Submitted</th><th>Remaining</th><th>Approved</th>
      <th>Under Review</th><th>Rejected</th><th>Returned</th><th>Completion</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function formatDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function renderBreakdown(filtered){
  const listEl = document.getElementById('breakdownList');
  document.getElementById('breakdownContext').textContent = `${uniqueInOrder(filtered.map(r=>r.area)).length} area(s) / part(s)`;

  if(filtered.length===0){
    listEl.innerHTML = `
    <div class="empty-state glass">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto;"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <h3>No submissions match these filters</h3>
      <p>Try widening your Discipline, Sub-Discipline, Trade, or Area selection, or reset filters to see all tracked submissions.</p>
    </div>`;
    return;
  }

  const areas = uniqueInOrder(filtered.map(r=>r.area));
  const html = areas.map(area=>{
    const areaRecords = filtered.filter(r=>r.area===area);
    const agg = computeAgg(areaRecords);
    const discipline = areaRecords[0].discipline;
    const subDisciplines = uniqueInOrder(areaRecords.map(r=>r.subDiscipline));
    const isOpen = openAreas.has(area);
    const subBlocks = subDisciplines.map(sd=>{
      const sdRecords = areaRecords.filter(r=>r.subDiscipline===sd);
      return `<div class="subd-block"><div class="subd-title">${sd}</div>${renderTradeTable(sdRecords)}</div>`;
    }).join('');

    return `
    <div class="area-card glass ${isOpen?'open':''}" data-area="${area.replace(/"/g,'&quot;')}">
      <div class="area-head">
        <div class="area-chevron">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="area-id">${areaCode(area)}</div>
        <div class="area-name">${area}</div>
        <div class="area-tags">
          <span class="tag">${discipline}</span>
          ${subDisciplines.map(sd=>`<span class="tag">${sd}</span>`).join('')}
        </div>
        <div class="area-mini-stats">
          <div class="mini-stat"><div class="n">${agg.required}</div><div class="l">Required</div></div>
          <div class="mini-stat"><div class="n">${agg.submitted}</div><div class="l">Submitted</div></div>
          <div class="mini-stat"><div class="n">${agg.remaining}</div><div class="l">Remaining</div></div>
        </div>
        <div class="completion-pill ${pcClass(agg.completion)}">${agg.completion}%</div>
      </div>
      <div class="area-body"><div class="area-body-inner">${subBlocks}</div></div>
    </div>`;
  }).join('');

  listEl.innerHTML = html;

  listEl.querySelectorAll('.area-head').forEach(head=>{
    head.addEventListener('click', ()=>{
      const card = head.closest('.area-card');
      const area = card.getAttribute('data-area');
      if(openAreas.has(area)){ openAreas.delete(area); card.classList.remove('open'); }
      else { openAreas.add(area); card.classList.add('open'); }
    });
  });

  listEl.querySelectorAll('.trade-row').forEach(row=>{
    row.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = row.getAttribute('data-record');
      if(openTrades.has(id)) openTrades.delete(id); else openTrades.add(id);
      renderMain();
    });
  });
}

/* ============ RESULT COUNT ============ */
function renderResultCount(filtered){
  document.getElementById('resultCount').innerHTML = `<b>${filtered.length}</b> of ${RECORDS.length} submission records match current filters`;
}

/* ============ MAIN RENDER (data-driven sections only, not selects) ============ */
function renderMain(){
  const filtered = getFiltered();
  renderResultCount(filtered);
  renderSummary(filtered);
  renderBreakdown(filtered);
  updateActiveFilterBadge();
}

/* ============ THEME TOGGLE ============ */
function initTheme(){
  const root = document.documentElement;
  const iconEl = document.getElementById('themeIcon');
  const saved = 'light';
  root.setAttribute('data-theme', saved);
  function setIcon(mode){
    if(mode==='dark'){
      iconEl.innerHTML = '<circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
    } else {
      iconEl.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
  }
  setIcon(saved);
  document.getElementById('themeToggle').addEventListener('click', ()=>{
    const cur = root.getAttribute('data-theme');
    const next = cur==='dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    setIcon(next);
  });
}

function updateActiveFilterBadge(){
  const badge = document.getElementById('activeFilterBadge');
  let count = state.discipline.length + state.subDiscipline.length + state.trade.length + state.area.length + state.status.length;
  if(state.dateFrom) count++;
  if(state.dateTo) count++;
  if(state.search) count++;
  if(count>0){
    badge.hidden = false;
    badge.textContent = `${count} active`;
  } else {
    badge.hidden = true;
  }
}

/* ============ FIELD BINDINGS ============ */
function initFields(){
  document.getElementById('dateFrom').addEventListener('change', e=>{ state.dateFrom = e.target.value; renderMain(); });
  document.getElementById('dateTo').addEventListener('change', e=>{ state.dateTo = e.target.value; renderMain(); });
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e=>{
    clearTimeout(searchTimer);
    const val = e.target.value;
    searchTimer = setTimeout(()=>{ state.search = val; renderMain(); }, 180);
  });
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    state.discipline=[]; state.subDiscipline=[]; state.trade=[]; state.area=[]; state.status=[];
    state.dateFrom=''; state.dateTo=''; state.search='';
    document.getElementById('dateFrom').value='';
    document.getElementById('dateTo').value='';
    document.getElementById('searchInput').value='';
    openAreas.clear(); openTrades.clear();
    refreshAllSelectDisplays();
    renderMain();
  });
  document.getElementById('printBtn').addEventListener('click', ()=>{
    const filtered = getFiltered();
    const areas = uniqueInOrder(filtered.map(r=>r.area));
    areas.forEach(a=>openAreas.add(a));
    renderMain();
    setTimeout(()=>window.print(), 80);
  });
  document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);
  document.getElementById('exportPdfBtn').addEventListener('click', exportPdf);
}

/* ============ EXPORTS ============ */
function buildExportRows(){
  const filtered = getFiltered();
  return filtered.map(r=>({
    'Discipline': r.discipline,
    'Sub-Discipline': r.subDiscipline,
    'Trade': r.trade,
    'Area / Part': r.area,
    'Status': statusLabel(r.status),
    'Date': r.date,
    'Reference ID': r.id
  }));
}

function exportExcel(){
  try{
    const rows = buildExportRows();
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:16},{wch:22},{wch:16},{wch:20},{wch:12},{wch:14}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Submissions');

    const agg = computeAgg(getFiltered());
    const summaryRows = [{
      'Required':agg.required,'Submitted':agg.submitted,'Remaining':agg.remaining,'Approved':agg.approved,
      'Under Review':agg.underReview,'Rejected':agg.rejected,'Returned for Revision':agg.returned,'Completion %':agg.completion
    }];
    const ws2 = XLSX.utils.json_to_sheet(summaryRows);
    XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

    XLSX.writeFile(wb, 'ZED_East_Submission_Export.xlsx');
  }catch(err){ console.error(err); alert('Export failed: '+err.message); }
}

function exportPdf(){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'landscape', unit:'pt' });
    doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('ZED East — Engineering Submission Report', 32, 30);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text('Data as of Jul 12, 2026', 32, 46);

    const agg = computeAgg(getFiltered());
    doc.autoTable({
      startY:58,
      head:[['Required','Submitted','Remaining','Approved','Under Review','Rejected','Returned','Completion %']],
      body:[[agg.required, agg.submitted, agg.remaining, agg.approved, agg.underReview, agg.rejected, agg.returned, agg.completion+'%']],
      theme:'grid', headStyles:{ fillColor:[37,64,201] }, styles:{ fontSize:9 }
    });

    const rows = buildExportRows();
    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 16,
      head:[['Discipline','Sub-Discipline','Trade','Area / Part','Status','Date','Reference ID']],
      body: rows.map(r=>[r['Discipline'],r['Sub-Discipline'],r['Trade'],r['Area / Part'],r['Status'],r['Date'],r['Reference ID']]),
      theme:'striped', headStyles:{ fillColor:[37,64,201] }, styles:{ fontSize:8 }
    });

    doc.save('ZED_East_Submission_Report.pdf');
  }catch(err){ console.error(err); alert('Export failed: '+err.message); }
}

/* ============ INIT ============ */
function init(){
  document.getElementById('totalBadge').textContent = RECORDS.length + ' tracked items';
  initTheme();
  initSelects();
  initFields();
  renderMain();
}
document.addEventListener('DOMContentLoaded', init);
})();

</script>
</body>
</html>
